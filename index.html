<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>GTOtinaz · GTO Trainer</title>
<!-- App su schermata Home (iPhone/iPad/Mac) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GTOtinaz">
<meta name="theme-color" content="#07090d">
<link rel="apple-touch-icon" href="appicon.png">
<link rel="icon" type="image/svg+xml" href="appicon.svg">
<link rel="manifest" href="manifest.json">
<style>
:root{
  --bg:#0b0e0d; --panel:#141b17; --panel2:#1a231d; --line:#2a342c;
  --felt1:#2f7d5a; --felt2:#0e3526; --feltedge:#0a2a1d; --rail:#2c3133; --rail2:#15191a; --railtrim:#c9a24b;
  --ink:#ece7dd; --ink-dim:#9aa79e; --gold:#c9a24b;
  --ok:#46b06a; --mid:#d8a23a; --bad:#d65b5b; --mix:#5aa6bf;
  --redcard:#c0392b; --blackcard:#191919;
  --c-heart:#e23b40; --c-diamond:#2f7fe0; --c-club:#2a9d4f; --c-spade:#565c64;
  --sf:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Inter,"Segoe UI",Roboto,system-ui,sans-serif;
}
*{box-sizing:border-box}
button,.seg button,.cardslot,.card,[role=button]{touch-action:manipulation}
html,body{margin:0;background:var(--bg);color:var(--ink);
  touch-action:manipulation;-webkit-text-size-adjust:100%;
  font-family:var(--sf);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
.mono{font-family:var(--sf);font-variant-numeric:tabular-nums}
.serif{font-family:var(--sf)}
a{color:var(--gold)}

.wrap{max-width:920px;margin:0 auto;padding:14px 14px 40px}

/* top bar */
.top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:4px 2px 16px;margin-bottom:14px}
.top h1{font-family:var(--sf);font-weight:700;font-size:23px;letter-spacing:-.03em;margin:0;line-height:1;color:#F5F5F7}
.top h1 .sub{color:#86868B;font-weight:600;letter-spacing:-.01em}
.top .tag{display:none}
.stats{margin-left:auto;display:flex;gap:16px;align-items:baseline}
.stat{ text-align:right}
.stat b{font-size:15px}
.stat span{display:block;font-size:9.5px;color:var(--ink-dim);letter-spacing:.12em;text-transform:uppercase}

/* table */
.tablewrap{position:relative;width:100%;aspect-ratio:16/11;max-height:64vh;margin:0 auto}
.rail{position:absolute;inset:0;border-radius:48% / 50%;
  background:linear-gradient(165deg,#363c3e,var(--rail) 30%,var(--rail2));
  padding:2.6%;box-shadow:0 22px 50px rgba(0,0,0,.6), inset 0 1px 0 #ffffff14, inset 0 0 0 1px #0009}
.felt{position:absolute;inset:2.6%;border-radius:48% / 50%;overflow:hidden;
  background:
    radial-gradient(ellipse 70% 55% at 50% 30%, #3a8e68 0%, var(--felt1) 38%, var(--felt2) 78%, var(--feltedge) 100%);
  box-shadow:inset 0 0 70px rgba(0,0,0,.6), inset 0 0 0 5px #0b3023, inset 0 0 0 6px #c9a24b33}
/* inner racetrack line (dove arrivano le puntate), come ai tavoli PokerStars */
.felt::before{content:"";position:absolute;inset:13% 11%;border-radius:50%/50%;
  border:1px solid #ffffff14;box-shadow:inset 0 0 30px #00000040}
/* alone di luce dall'alto */
.felt::after{content:"";position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 55% 30% at 50% 8%, #ffffff14, transparent 70%)}

/* center pot + board */
.center{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);text-align:center;width:64%;z-index:2}
.pot{display:inline-flex;align-items:center;gap:7px;font-family:var(--sf);font-variant-numeric:tabular-nums;
  font-size:clamp(11px,2.4vw,14px);color:var(--ink);letter-spacing:.02em;margin-bottom:10px;
  background:rgba(7,16,12,.55);border:1px solid #ffffff1c;border-radius:999px;padding:4px 12px 4px 8px;
  backdrop-filter:blur(2px);box-shadow:0 2px 8px #0006}
.pot:empty{display:none}   /* niente pillola/lineetta al centro quando il piatto è vuoto (preview) */
.pot .chip{width:14px;height:14px;border-radius:50%;flex:none;
  background:radial-gradient(circle at 50% 38%,#e6c46a,#c9a24b 60%,#9a7a32);
  box-shadow:0 0 0 2px #00000040, inset 0 0 0 2px #ffffff33;position:relative}
.pot .chip::after{content:"";position:absolute;inset:3px;border-radius:50%;border:1px dashed #ffffff66}
.pot b{color:var(--gold);font-weight:700}
.pot small{color:var(--ink-dim)}
.board{display:flex;gap:clamp(3px,1vw,7px);justify-content:center;min-height:1px}

/* cards */
.card{width:clamp(26px,6.4vw,46px);aspect-ratio:5/7;border-radius:6px;background:var(--sc,#565c64);color:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;
  box-shadow:0 3px 7px rgba(0,0,0,.45), inset 0 0 0 1px #ffffff33;font-family:var(--sf);font-weight:700;position:relative}
.card .r{font-size:clamp(12px,3.1vw,22px);letter-spacing:-.02em;font-weight:800;color:#fff;line-height:1.05;text-align:center}
.card .s{font-size:clamp(9px,2.3vw,15px);margin-top:1px;color:#fff;line-height:1;text-align:center}
.card.su-h{--sc:var(--c-heart)}.card.su-d{--sc:var(--c-diamond)}.card.su-c{--sc:var(--c-club)}.card.su-s{--sc:var(--c-spade)}
.card.back{background:
    repeating-linear-gradient(45deg,#8d2424,#8d2424 5px,#6e1b1b 5px,#6e1b1b 10px);
  box-shadow:0 3px 7px rgba(0,0,0,.45), inset 0 0 0 1px #ffffff33, inset 0 0 0 3px #ffffff14}
.card.mini{width:clamp(20px,4.6vw,30px)}
.card.fold{opacity:.26}

/* seats */
.seat{position:absolute;transform:translate(-50%,-50%);width:clamp(96px,21vw,150px);text-align:center;z-index:3}
.seat .cards{display:flex;gap:3px;justify-content:center;margin-bottom:5px;min-height:1px}
.plate{display:flex;align-items:center;gap:7px;text-align:left;
  background:linear-gradient(180deg,#202a23,#151c18);border:1px solid var(--line);
  border-radius:11px;padding:5px 9px 5px 6px;position:relative;box-shadow:0 4px 12px #0006}
.plate .ava{width:26px;height:26px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#0c100e;background:radial-gradient(circle at 50% 35%,#cfd6cf,#8d978e);box-shadow:inset 0 0 0 1px #ffffff55}
.plate .info{min-width:0;flex:1}
.plate.hero{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)66,0 6px 18px #0008}
.plate.hero .ava{background:radial-gradient(circle at 50% 35%,#e6c46a,#c9a24b 65%,#9a7a32)}
.plate.turn{border-color:var(--ok);animation:turnpulse 1.3s ease-in-out infinite}
@keyframes turnpulse{0%,100%{box-shadow:0 0 0 1px var(--ok),0 0 14px #46b06a55}50%{box-shadow:0 0 0 1px var(--ok),0 0 26px #46b06a99}}
.plate.turn .ava{position:relative}
.plate.turn .ava::after{content:"";position:absolute;inset:-3px;border-radius:50%;
  background:conic-gradient(var(--ok) 0 28%, #ffffff10 28% 100%);
  -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#000 calc(100% - 3px));
          mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#000 calc(100% - 3px));
  animation:spin 1.1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.plate.out{opacity:.42}
.nm{font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px;flex-wrap:wrap;line-height:1.25}
.posb{font-size:8px;font-weight:700;letter-spacing:.04em;background:#0007;color:var(--gold);
  border:1px solid var(--gold)55;border-radius:4px;padding:1px 4px;flex:none}
.ptag{font-size:7.5px;font-weight:800;letter-spacing:.05em;border-radius:4px;padding:1px 4px;flex:none;margin-left:1px}
.pt-station{background:rgba(214,91,91,.22);color:#e98a8a;border:1px solid #d65b5b55}
.pt-lag{background:rgba(216,162,58,.22);color:#e2b552;border:1px solid #d8a23a55}
.pt-tag{background:rgba(70,176,106,.20);color:#6fce92;border:1px solid #46b06a55}
.pt-nit{background:rgba(90,166,191,.20);color:#7ec3da;border:1px solid #5aa6bf55}
.pt-gto{background:rgba(255,255,255,.12);color:#cfd6cf;border:1px solid #ffffff33}
.stk{font-family:var(--sf);font-variant-numeric:tabular-nums;font-size:11px;color:#cdd6cd;margin-top:1px}
.act{font-size:9.5px;color:var(--ink);margin-top:1px;min-height:11px;font-family:var(--sf);font-variant-numeric:tabular-nums}
.act.fold{color:var(--bad)} .act.raise{color:var(--gold)} .act.call{color:#7fb4e0}

/* bet chips toward center */
.bet{position:absolute;font-family:var(--sf);font-variant-numeric:tabular-nums;font-size:10px;color:#1a1409;font-weight:700;
  background:linear-gradient(180deg,#e6c46a,#c9a24b);border-radius:999px;padding:2px 8px 2px 18px;white-space:nowrap;
  box-shadow:0 2px 5px #0008, inset 0 0 0 1px #ffffff44;transform:translate(-50%,-50%);z-index:4}
.bet::before{content:"";position:absolute;left:3px;top:50%;transform:translateY(-50%);
  width:11px;height:11px;border-radius:50%;background:radial-gradient(circle at 50% 38%,#fff,#d9b85e 60%,#a8842f);
  box-shadow:0 0 0 1.5px #00000033, inset 0 0 0 1px #ffffff88}
.dealer{position:absolute;width:24px;height:24px;transform:translate(-50%,-50%);z-index:6;
  filter:drop-shadow(0 3px 5px rgba(0,0,0,.55))}
.dealer svg{display:block;width:100%;height:100%}
.dealer .dlabel{font-family:var(--sf);font-weight:800;font-size:12px;fill:#1a1a1a;letter-spacing:0}
#fxlayer{position:absolute;inset:0;pointer-events:none;z-index:5}
.flychip{position:absolute;font-family:var(--sf);font-variant-numeric:tabular-nums;font-size:10px;color:#1a1409;font-weight:700;
  background:linear-gradient(180deg,#e6c46a,#c9a24b);border-radius:999px;padding:2px 8px 2px 18px;white-space:nowrap;
  box-shadow:0 2px 5px #0008, inset 0 0 0 1px #ffffff44;transform:translate(-50%,-50%);
  transition:top .5s cubic-bezier(.5,0,.3,1),left .5s cubic-bezier(.5,0,.3,1),opacity .5s ease,transform .5s ease}
.flychip::before{content:"";position:absolute;left:3px;top:50%;transform:translateY(-50%);width:11px;height:11px;border-radius:50%;
  background:radial-gradient(circle at 50% 38%,#fff,#d9b85e 60%,#a8842f);box-shadow:0 0 0 1.5px #00000033, inset 0 0 0 1px #ffffff88}
.plate.winner{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold),0 0 26px #c9a24bcc;animation:winpulse 1s ease-in-out infinite}
@keyframes winpulse{0%,100%{box-shadow:0 0 0 2px var(--gold),0 0 18px #c9a24b99}50%{box-shadow:0 0 0 2px var(--gold),0 0 30px #c9a24bee}}

/* controls */
.controls{margin-top:14px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px}
.handinfo{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--ink-dim);margin-bottom:10px}
.handinfo b{color:var(--ink);font-family:var(--sf);font-variant-numeric:tabular-nums}
.btnrow{display:flex;gap:8px;flex-wrap:wrap}
button.act-btn{flex:1;min-width:88px;padding:12px 10px;border-radius:9px;border:1px solid var(--line);
  background:var(--panel2);color:var(--ink);font-size:14px;font-weight:600;cursor:pointer;transition:.12s}
button.act-btn:hover{border-color:var(--gold);background:#222d25}
button.fold{color:#e88} button.fold:hover{border-color:var(--bad)}
button.raise{color:var(--gold)} button.primary{background:var(--gold);color:#1a1409;border-color:var(--gold)}
button:disabled{opacity:.4;cursor:not-allowed}
.raisebox{margin-top:10px;display:none;gap:8px;align-items:center;flex-wrap:wrap}
.raisebox.show{display:flex}
.raisebox input[type=range]{flex:1;min-width:140px;accent-color:var(--gold)}
.sizebtns{display:flex;gap:6px;flex-wrap:wrap}
.sizebtns button{font-size:11px;padding:6px 9px;border-radius:7px;border:1px solid var(--line);background:var(--panel2);color:var(--ink-dim);cursor:pointer}
.sizebtns button:hover{color:var(--ink);border-color:var(--gold)}
.raiseval{font-family:var(--sf);font-variant-numeric:tabular-nums;font-size:14px;color:var(--gold);min-width:96px;text-align:right}

/* feedback */
.fb{margin-top:14px;border-radius:12px;padding:14px 16px;border:1px solid var(--line);background:var(--panel);display:none}
.fb.show{display:block;animation:rise .25s ease}
@keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fb .verdict{font-family:var(--sf);font-size:18px;font-weight:600;display:flex;align-items:center;gap:9px}
.fb .dot{width:11px;height:11px;border-radius:50%}
.v-ottimo .dot{background:var(--ok)} .v-ottimo .verdict{color:var(--ok)}
.v-ok .dot{background:var(--mid)} .v-ok .verdict{color:var(--mid)}
.v-errore .dot{background:var(--bad)} .v-errore .verdict{color:var(--bad)}
.v-mixed .dot{background:var(--mix)} .v-mixed .verdict{color:var(--mix)}
.fb .note{margin-top:10px;font-size:12.5px;line-height:1.55;color:var(--ink);background:rgba(90,150,170,.10);border-left:3px solid var(--mix);padding:9px 12px;border-radius:0 7px 7px 0}
.fb .note::before{content:"⇄ Spot mixed  ";font-weight:600;color:var(--mix);letter-spacing:.3px}
.fb .line{margin-top:8px;font-size:13.5px;line-height:1.5}
.fb .rec{font-family:var(--sf);font-variant-numeric:tabular-nums;color:var(--gold)}
.fb .why{color:var(--ink-dim);margin-top:6px;font-size:13px;line-height:1.55}
.fb .meta{margin-top:8px;font-size:11px;color:var(--ink-dim);font-family:var(--sf);font-variant-numeric:tabular-nums}
.fb .next{margin-top:12px}
.fbbars{margin-top:12px;flex-direction:column;gap:7px}
.barrow{display:flex;align-items:center;gap:10px;font-size:11.5px;color:var(--ink-dim)}
.barlab{width:118px;flex:none}
.bartrack{position:relative;flex:1;height:9px;border-radius:5px;background:rgba(255,255,255,.07);overflow:hidden}
.barfill{height:100%;border-radius:5px;transition:width .4s ease}
.barfill.eq{background:linear-gradient(90deg,#3a8e68,var(--ok))}
.barfill.eqlow{background:linear-gradient(90deg,#8a3d3d,var(--bad))}
.barfill.po{background:linear-gradient(90deg,#8a6b2e,var(--gold))}
.barfill.mdf{background:linear-gradient(90deg,#3a6f86,var(--mix))}
.bartrack .barmark{position:absolute;top:0;bottom:0;width:2px;background:#fff;box-shadow:0 0 3px #000}
.barval{width:36px;text-align:right;font-variant-numeric:tabular-nums;color:var(--ink)}
.fbfreq{margin-top:12px}
.freqlabel{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:5px}
.fbar{display:flex;height:18px;border-radius:5px;overflow:hidden;background:rgba(255,255,255,.06);gap:1px}
.fseg{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#0c100e;min-width:0}
.fseg.c-d{background:var(--gold)} .fseg.c-b{background:var(--mix)} .fseg.c-t{background:#5fae8a} .fseg.c-g{background:#5b6660;color:var(--ink)}
.flegwrap{display:flex;flex-wrap:wrap;gap:12px;margin-top:6px;font-size:11px;color:var(--ink-dim)}
.fleg{display:flex;align-items:center;gap:5px}
.fleg i{width:9px;height:9px;border-radius:2px;display:inline-block}
.fleg i.c-d{background:var(--gold)} .fleg i.c-b{background:var(--mix)} .fleg i.c-t{background:#5fae8a} .fleg i.c-g{background:#5b6660}

.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:12px;font-size:12px;color:var(--ink-dim)}
.toolbar label{display:flex;align-items:center;gap:6px;cursor:pointer}
.toolbar button{font-size:12px;padding:6px 11px;border-radius:7px;border:1px solid var(--line);background:var(--panel2);color:var(--ink-dim);cursor:pointer}
.toolbar button:hover{color:var(--ink);border-color:var(--gold)}
.eqbar{margin-left:auto;font-family:var(--sf);font-variant-numeric:tabular-nums;font-size:12px}
.eqbar b{color:var(--gold)}

.note{font-size:11px;color:var(--ink-dim);line-height:1.5;margin-top:18px;border-top:1px solid var(--line);padding-top:12px}
.result{font-family:var(--sf);font-size:14px;color:var(--gold);text-align:center;margin-top:2px;min-height:18px}
/* modals */
.modal{display:none;position:fixed;inset:0;background:rgba(8,14,11,.72);z-index:50;align-items:flex-start;justify-content:center;padding:5vh 14px;overflow-y:auto}
.modal.show{display:flex}
.modal-box{background:var(--panel);border:1px solid var(--line);border-radius:14px;max-width:560px;width:100%;padding:16px 18px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-head{display:flex;justify-content:space-between;align-items:center;font-family:var(--sf);font-size:17px;color:var(--ink);margin-bottom:12px}
.modal-head small{font-size:11px;color:var(--ink-dim);font-family:inherit}
.modal-head .x{background:none;border:none;color:var(--ink-dim);font-size:16px;cursor:pointer;padding:4px 8px}
.modal-head .x:hover{color:var(--ink)}
.modal-foot{margin-top:14px;border-top:1px solid var(--line);padding-top:12px}
.modal-foot button{font-size:12px;padding:6px 11px;border-radius:7px;border:1px solid var(--bad);background:transparent;color:var(--bad);cursor:pointer}
.modal-foot button:hover{background:rgba(214,91,91,.12)}
.rempty{color:var(--ink-dim);font-size:13px;line-height:1.55}
.rrow{display:grid;grid-template-columns:1fr 70px 130px;gap:8px;align-items:center;font-size:12.5px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.rrow.rhead{color:var(--ink-dim);font-size:11px;border-bottom:1px solid var(--line)}
.rbar{display:inline-block;width:60px;height:6px;border-radius:3px;background:rgba(255,255,255,.08);vertical-align:middle;margin-left:6px;overflow:hidden}
.rbar div{height:100%}
.leakflag{font-size:10px;color:var(--bad);border:1px solid var(--bad);border-radius:4px;padding:1px 5px;margin-left:6px}
.rsub{margin-top:14px;font-family:var(--sf);color:var(--ink-dim);font-size:13px}
.rposwrap{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
.rpos{font-size:12px;color:var(--ink);font-family:var(--sf);font-variant-numeric:tabular-nums}
.rpos small{color:var(--ink-dim)}
.rtot{margin-top:14px;font-size:12.5px;color:var(--ink-dim)}
.rtip{margin-top:10px;font-size:12.5px;color:var(--ink);background:rgba(201,162,75,.10);border-left:3px solid var(--gold);padding:9px 12px;border-radius:0 7px 7px 0}
/* range grid */
.rgrid{display:grid;grid-template-columns:repeat(13,1fr);gap:2px}
.rc{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:9px;font-family:var(--sf);font-variant-numeric:tabular-nums;border-radius:3px;color:var(--ink-dim);background:var(--panel2)}
.rc.in{background:rgba(70,176,106,.32);color:var(--ink)}
.rc.in.pair{background:rgba(70,176,106,.5)}
.rc.tb{background:rgba(201,162,75,.40);color:var(--ink)}
.rc.cur{outline:2px solid var(--gold);outline-offset:-2px;color:#fff;font-weight:700}
.rlegend{display:flex;gap:16px;margin-top:12px;font-size:11px;color:var(--ink-dim);align-items:center}
.rlegend .sw{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:5px;vertical-align:middle}
.rlegend .sw.in{background:rgba(70,176,106,.5)}
.rlegend .sw.tb{background:rgba(201,162,75,.5)}
.rlegend .sw.out{background:var(--panel2)}
.rlegend .sw.cur{outline:2px solid var(--gold);outline-offset:-2px}
.rnote{margin-top:10px;font-size:11.5px;color:var(--ink-dim);line-height:1.5}
@media(max-width:560px){
  .seat{width:clamp(62px,22vw,110px)}
  .top h1{font-size:16px}
  .stats{gap:10px}
  .rc{font-size:7px}
  .rrow{grid-template-columns:1fr 50px 110px}
}
/* ===== ottimizzazione telefono ===== */
@media(max-width:480px){
  .wrap{padding:10px 10px 46px}
  .top{margin-bottom:6px}
  .top h1{font-size:16px}
  .tag{font-size:9px;line-height:1.45}
  /* tavolo: grande in setup (per toccare le carte), compatto in gioco */
  .tablewrap{aspect-ratio:5/4.4;max-height:46dvh}
  body.an-live .tablewrap{aspect-ratio:6/5;max-height:36dvh}
  .seat{width:clamp(60px,22vw,100px);display:flex;flex-direction:column;align-items:center;gap:3px}
  .seat .cards{margin-bottom:0;gap:2px}
  .plate{gap:5px;padding:5px 7px 5px 5px;border-radius:10px}
  .plate .ava{width:22px;height:22px;font-size:10px}
  .nm{font-size:10px;gap:3px}
  .posb{font-size:7px;padding:1px 3px}
  .stk{font-size:10px}
  .act{font-size:8.5px;min-height:10px}
  .center{width:84%;top:42%}
  /* il "Piatto" al centro non serve in gioco, ma le carte del board (flop/turn/river) sì:
     nascondo solo il testo del piatto e tengo visibile il board */
  body.an-live .center{display:block}
  body.an-live .center .pot{display:none}
  body.an-live .center .result{display:none}
  body.an-live .center .board{margin-top:0}
  .center .pot{white-space:normal;line-height:1.35;text-align:center}
  .emptyhint{font-size:10.5px}
  .pot{font-size:11.5px;padding:3px 11px 3px 8px;margin-bottom:7px}
  .bet{font-size:9px!important;padding:2px 7px 2px 16px!important}
  /* tavolo pieno (7-9 giocatori): riquadri molto più compatti per non sovrapporsi */
  .tablewrap.t-big .seat{width:clamp(44px,15vw,78px)}
  .tablewrap.t-big .plate{padding:3px 5px 3px 3px;gap:3px;border-radius:8px}
  .tablewrap.t-big .plate .ava{width:17px;height:17px;font-size:8px}
  .tablewrap.t-big .nm{font-size:8px;gap:2px;line-height:1.15}
  .tablewrap.t-big .posb{font-size:6px;padding:0 2px}
  .tablewrap.t-big .stk{font-size:8px}
  .tablewrap.t-big .act{font-size:7px;min-height:8px}
  .tablewrap.t-big .seat{gap:2px}
  .tablewrap.t-big .seat .cards{margin-bottom:0}
  .tablewrap.t-big .seat .cards .card{width:clamp(12px,3.2vw,18px)}
  .tablewrap.t-big .bet{font-size:7.5px!important;padding:1px 6px 1px 14px!important}
  .tablewrap.t-big .bet::before{width:9px;height:9px;left:3px}
  /* in gioco: nascondi il sottotitolo per liberare spazio verticale (niente scroll) */
  body.an-live .tag{display:none}
  body.an-live .top{margin-bottom:2px}
  .board{gap:3px}
  .card{border-radius:5px}
  .cardslot{border-radius:5px}
  /* carte hero da selezionare (setup): più grandi e comode da toccare su telefono */
  .cards-hero{gap:7px}
  .cards-hero .cardslot.mini{width:clamp(42px,12vw,58px);font-size:23px;border-radius:10px}
  .cards-hero .card.mini{width:clamp(42px,12vw,58px);border-radius:10px}
  .cards-hero .card.mini .r{font-size:clamp(19px,5.2vw,27px)}
  .cards-hero .card.mini .s{font-size:clamp(12px,3.5vw,18px)}
  .dealer{width:18px;height:18px}

  /* ordine in gioco: tavolo → cosa fare → scelte → (staccato) selettori */
  #analysis{display:flex;flex-direction:column;gap:4px}
  #fb-an{order:1;margin-top:3px}
  /* la strip non è più una card: i due blocchi interni diventano card separate */
  .an-strip{order:2;display:flex;flex-direction:column;gap:0;background:transparent;border:none;padding:0}
  #analysis .an-choices{order:1;display:flex;flex-direction:column;gap:5px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:10px 12px}
  #analysis .an-setup-wrap{order:2;display:flex;flex-direction:column;gap:7px;margin-top:14px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:11px 12px}
  /* in setup (carte non ancora scelte) mostra solo i selettori, non una card scelte vuota */
  body:not(.an-live) #analysis .an-choices{display:none}
  #an-err{order:1}
  #an-turn{order:2;margin:0}
  #an-actbtns{order:3}
  .an-actions{order:4}
  #an-hint{text-align:center;margin-top:2px}

  /* selettori compatti */
  .an-line{flex-wrap:wrap;gap:5px 7px}
  .an-lab{font-size:10.5px}
  .seg.sm button{min-height:30px;font-size:11.5px;padding:3px 8px}

  /* bottoni decisione: compatti ma tappabili */
  #an-actbtns{gap:6px}
  #an-actbtns button{flex:1 1 30%;min-height:38px;font-size:12.5px;padding:6px 5px}
  .an-turn{font-size:11px;margin:0;line-height:1.25}

  /* "cosa conviene fare" molto compatto e subito visibile */
  .fb.an-inline{margin-top:0;padding:8px 11px}
  .rngbadge{font-size:10px;padding:2px 7px;margin-bottom:4px}
  .rec-big{font-size:14px;margin-bottom:2px}
  #fb-an .sizerec{display:none}        /* ridondante: il consiglio mostra già la size */
  #fb-an .prevfoot{display:none}       /* nota anteprima: non serve su telefono */
  #fb-an .meta{display:none}           /* dettagli equity/SPR: nascosti per compattezza */
  #fb-an .opt-list{display:flex;flex-direction:column;gap:3px}
  #fb-an .opt{padding:4px 9px;gap:7px}
  #fb-an .opt .dot{width:9px;height:9px}
  #fb-an .oname{font-size:11.5px}
  #fb-an .over{font-size:10px}
  #fb-an .fbbars{margin:3px 0;gap:3px}
  #fb-an .fbbars .barrow{font-size:9.5px;gap:7px}
  #fb-an .fbfreq{display:none}
  .fb .why{font-size:10.5px;line-height:1.3;margin-top:3px}
}

  <div class="tablewrap" id="tablewrap">

<script>
/* ============================ CORE ENGINE ============================ */
const RANKS="23456789TJQKA",SUITS="cdhs",SYM=["♣","♦","♥","♠"];
const suitClass=s=>['su-c','su-d','su-h','su-s'][s]; // fiori=verde, quadri=blu, cuori=rosso, picche=grigio
const SB=1,BB=2,STACK=200;
function makeDeck(){const d=[];for(let r=2;r<=14;r++)for(let s=0;s<4;s++)d.push({r,s});return d;}
function shuffle(d){for(let i=d.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[d[i],d[j]]=[d[j],d[i]];}return d;}
function eval5(c){const ranks=c.map(x=>x.r).sort((a,b)=>b-a),suits=c.map(x=>x.s),fl=suits.every(s=>s===suits[0]);
 const ct={};for(const r of ranks)ct[r]=(ct[r]||0)+1;
 const g=Object.keys(ct).map(Number).sort((a,b)=>ct[b]-ct[a]||b-a);
 const u=[...new Set(ranks)].sort((a,b)=>b-a);let sh=0;
 if(u.length===5){if(u[0]-u[4]===4)sh=u[0];else if(u[0]===14&&u[1]===5&&u[4]===2)sh=5;}
 let cat,tb;
 if(sh&&fl){cat=8;tb=[sh];}else if(ct[g[0]]===4){cat=7;tb=[g[0],g[1]];}
 else if(ct[g[0]]===3&&ct[g[1]]===2){cat=6;tb=[g[0],g[1]];}else if(fl){cat=5;tb=ranks;}
 else if(sh){cat=4;tb=[sh];}else if(ct[g[0]]===3){cat=3;tb=[g[0],...g.slice(1)];}
 else if(ct[g[0]]===2&&ct[g[1]]===2){const hp=Math.max(g[0],g[1]),lp=Math.min(g[0],g[1]);cat=2;tb=[hp,lp,g[2]];}
 else if(ct[g[0]]===2){cat=1;tb=[g[0],...g.slice(1)];}else{cat=0;tb=ranks;}
 const t=tb.slice(0,5);while(t.length<5)t.push(0);let sc=cat;for(const x of t)sc=sc*15+x;return sc;}
function comb5(a){const r=[],n=a.length,idx=[0,1,2,3,4];while(true){r.push([a[idx[0]],a[idx[1]],a[idx[2]],a[idx[3]],a[idx[4]]]);let i=4;while(i>=0&&idx[i]===n-5+i)i--;if(i<0)break;idx[i]++;for(let j=i+1;j<5;j++)idx[j]=idx[j-1]+1;}return r;}
function eval7(c){let b=0;for(const x of comb5(c)){const s=eval5(x);if(s>b)b=s;}return b;}
function handName(sc){const c=Math.floor(sc/Math.pow(15,5));return["carta alta","coppia","doppia coppia","tris","scala","colore","full","poker","scala colore"][c];}
function equity(hole,board,nOpp,iters){iters=iters||1500;
 const used=new Set([...hole,...board].map(c=>c.r*4+c.s));
 const base=makeDeck().filter(c=>!used.has(c.r*4+c.s));let win=0,tie=0;
 for(let it=0;it<iters;it++){const deck=base.slice();
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
  let di=0;const opps=[];for(let o=0;o<nOpp;o++)opps.push([deck[di++],deck[di++]]);
  const need=5-board.length,comm=board.concat(deck.slice(di,di+need));
  const hs=eval7(hole.concat(comm));let beat=true,share=1;
  for(const op of opps){const sc=eval7(op.concat(comm));if(sc>hs){beat=false;break;}else if(sc===hs)share++;}
  if(beat){if(share===1)win++;else tie+=1/share;}}
 return (win+tie)/iters;}
// combo concreti per una mano canonica ("AKs","77","T9o")
function comboCandidates(h){const hi=RANKS.indexOf(h[0])+2,lo=RANKS.indexOf(h[1])+2,out=[];
 if(h.length===2){for(let s1=0;s1<4;s1++)for(let s2=s1+1;s2<4;s2++)out.push([{r:hi,s:s1},{r:hi,s:s2}]);}
 else if(h[2]==='s'){for(let s=0;s<4;s++)out.push([{r:hi,s},{r:lo,s}]);}
 else{for(let s1=0;s1<4;s1++)for(let s2=0;s2<4;s2++)if(s1!==s2)out.push([{r:hi,s:s1},{r:lo,s:s2}]);}
 return out;}
// equity vs range avversari: oppRanges = array di array di mani canoniche
function equityVsRanges(hole,board,oppRanges,iters){iters=iters||1500;
 const K=c=>c.r*4+c.s,pools=oppRanges.map(rg=>rg.flatMap(comboCandidates));
 if(pools.some(p=>p.length===0))return equity(hole,board,oppRanges.length,iters); // fallback
 let win=0,tie=0,valid=0;
 for(let it=0;it<iters;it++){const dead=new Set([...hole,...board].map(K));let ok=true;const opps=[];
  for(const pool of pools){let combo=null;
   for(let t=0;t<25;t++){const c=pool[Math.floor(Math.random()*pool.length)];if(!dead.has(K(c[0]))&&!dead.has(K(c[1]))){combo=c;break;}}
   if(!combo){ok=false;break;}dead.add(K(combo[0]));dead.add(K(combo[1]));opps.push(combo);}
  if(!ok)continue;
  const deck=makeDeck().filter(c=>!dead.has(K(c)));
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
  const need=5-board.length,comm=board.concat(deck.slice(0,need)),hs=eval7(hole.concat(comm));let beat=true,share=1;
  for(const op of opps){const sc=eval7(op.concat(comm));if(sc>hs){beat=false;break;}else if(sc===hs)share++;}
  if(beat){if(share===1)win++;else tie+=1/share;}valid++;}
 return valid?(win+tie)/valid:0.5;}
// ===== CONTINUATION RANGE: restringe il range del villain in base alle sue azioni postflop =====
const _K=c=>c.r*4+c.s;
function madeScore(hole,board){const sc=eval7(hole.concat(board)),cat=Math.floor(sc/Math.pow(15,5));
 let s;
 if(cat>=4)s=1.0;else if(cat===3)s=0.92;else if(cat===2)s=0.82;
 else if(cat===1){const all=hole.concat(board),cnt={};all.forEach(c=>cnt[c.r]=(cnt[c.r]||0)+1);
  const pr=Math.max(...Object.keys(cnt).filter(r=>cnt[r]>=2).map(Number));
  const bsort=[...new Set(board.map(c=>c.r))].sort((a,b)=>b-a);
  s=pr>=bsort[0]?0.68:(pr>=(bsort[1]||0)?0.5:0.38);} // top pair/overpair / middle / low
 else s=0.16;
 if(board.length<5){const cards=hole.concat(board),su={};cards.forEach(c=>su[c.s]=(su[c.s]||0)+1);
  const fd=Math.max(...Object.values(su))>=4,rk=[...new Set(cards.map(c=>c.r))];
  let sd=false;for(let r=2;r<=11;r++){let n=0;for(let k=0;k<4;k++)if(rk.includes(r+k))n++;if(n>=4){sd=true;break;}}
  if(fd||sd)s=Math.max(s,0.62);}
 return s;}
// soglia continuazione: più aggressivo/avanti il villain, più stretto il range di VALORE
// PUNTO 5: la soglia dipende anche dalla SIZE dell'ultima puntata del villain:
// puntata grande → range polarizzato (soglia più alta, poche mani medie); block-bet → range merged (soglia più bassa)
function contThresh(q,street,vsRaise){let base=q.postAgg>=2?0.62:q.postAgg===1?0.52:q.postPaid?0.40:0.22;
 base+=(street===4?0.03:street===5?0.05:0);
 if(q.postAgg>=1){const bf=q.lastBetFrac||0.6;base+=bf>=0.9?0.05:bf>=0.66?0.03:bf<=0.4?-0.04:0;}
 if(vsRaise)base-=0.04; // ti hanno RILANCIATO: includi anche i top pair come value (battono i tuoi bluff-catcher); l'effetto "range forte" lo dà soprattutto il taglio dei bluff
 // TETTO: 0.70 contro una puntata; contro un rilancio scende a 0.66 così i top pair restano tra i value (un bluff-catcher ci perde)
 return Math.max(0.12,Math.min(vsRaise?0.66:0.70,base));}
// un villain che PUNTA ha un range polarizzato: valore (>=thr) + una quota di bluff (aria). Un passivo no.
function contPool(arr,board,dead,thr,bluffFrac){const pool=arr.flatMap(comboCandidates).filter(c=>!dead.has(_K(c[0]))&&!dead.has(_K(c[1])));
 let kept=pool.filter(c=>madeScore(c,board)>=thr);
 if(bluffFrac>0){const air=pool.filter(c=>madeScore(c,board)<0.3);const step=Math.max(1,Math.round(1/bluffFrac));
  kept=kept.concat(air.filter((_,i)=>i%step===0));}
 return kept.length>=4?kept:pool;}
// sotto-campionamento DETERMINISTICO (no RNG → stabile): per i segnali grossolani (vantaggio di range, nut frac) bastano ~200 combo
function capPool(pool,cap){if(!pool||pool.length<=cap)return pool;const out=[],step=pool.length/cap;for(let i=0;i<cap;i++)out.push(pool[Math.floor(i*step)]);return out;}
// equity vs pool di combo già filtrati (continuation)
// PUNTO 1: al river non resta nulla da girare → equity ESATTA per enumerazione (deterministica, zero varianza).
function equityVsCombos(hole,board,pools,iters){
 if(!pools.length||pools.some(p=>!p||!p.length))return 0.5;
 if(board.length===5)return exactRiverEquity(hole,board,pools);
 return mcEquityVsCombos(hole,board,pools,iters||1300);}
function exactRiverEquity(hole,board,pools){
 const hs=eval7(hole.concat(board));
 const dead0=new Set([...hole,...board].map(_K));
 // pre-calcolo lo score di ogni combo: il board è fisso → niente eval7 ripetuti nei rami
 const scored=pools.map(pool=>pool.map(c=>({k0:_K(c[0]),k1:_K(c[1]),s:eval7(c.concat(board))}))
   .filter(o=>o.k0!==o.k1&&!dead0.has(o.k0)&&!dead0.has(o.k1)));
 if(scored.some(p=>!p.length))return 0.5;
 // testa a testa: enumerazione lineare esatta
 if(scored.length===1){let win=0,tie=0,tot=0;
  for(const o of scored[0]){tot++;if(hs>o.s)win++;else if(hs===o.s)tie+=0.5;}
  return tot?(win+tie)/tot:0.5;}
 // multiway: enumerazione completa se sotto budget, altrimenti Monte Carlo ad alte iterazioni
 let prod=1;for(const p of scored)prod*=p.length;
 if(prod>150000)return mcEquityVsCombos(hole,board,pools,9000);
 let win=0,share=0,tot=0;
 const rec=(idx,used,ahead,ties)=>{
  if(idx===scored.length){tot++;if(ahead){if(ties===0)win++;else share+=1/(ties+1);}return;}
  for(const o of scored[idx]){
   if(used.has(o.k0)||used.has(o.k1))continue;
   used.add(o.k0);used.add(o.k1);
   if(o.s>hs)rec(idx+1,used,false,ties);
   else rec(idx+1,used,ahead,ties+(o.s===hs?1:0));
   used.delete(o.k0);used.delete(o.k1);}
 };
 rec(0,new Set(),true,0);
 return tot?(win+share)/tot:0.5;}
function mcEquityVsCombos(hole,board,pools,iters){iters=iters||1300;
 const need=5-board.length,baseDead=[...hole,...board].map(_K),fullDeck=makeDeck(); // mazzo creato UNA volta, riusato
 let win=0,tie=0,valid=0;
 for(let it=0;it<iters;it++){const dead=new Set(baseDead);let ok=true;const opps=[];
  for(const pool of pools){let combo=null;for(let t=0;t<25;t++){const c=pool[(Math.random()*pool.length)|0],k0=_K(c[0]),k1=_K(c[1]);if(!dead.has(k0)&&!dead.has(k1)){combo=c;dead.add(k0);dead.add(k1);break;}}if(!combo){ok=false;break;}opps.push(combo);}
  if(!ok)continue;

  const comm=board.slice();let drawn=0,tries=0;
  while(drawn<need&&tries<200){const c=fullDeck[(Math.random()*52)|0],k=_K(c);if(!dead.has(k)){dead.add(k);comm.push(c);drawn++;}tries++;}
  if(drawn<need)continue;
  const hs=eval7(hole.concat(comm));let beat=true,share=1;
  for(const op of opps){const sc=eval7(op.concat(comm));if(sc>hs){beat=false;break;}else if(sc===hs)share++;}
  if(beat){if(share===1)win++;else tie+=1/share;}valid++;}

// equity di RANGE vs RANGE su questo board (vantaggio di range, alla GTO)
function rangeVsRange(hPool,vPool,board,iters){iters=iters||520;
 if(!hPool||!vPool||!hPool.length||!vPool.length)return 0.5;
 const need=5-board.length,boardKeys=board.map(_K),fullDeck=makeDeck();
 let sum=0,n=0;
 for(let it=0;it<iters;it++){
  const hc=hPool[(Math.random()*hPool.length)|0],vc=vPool[(Math.random()*vPool.length)|0];
  const used=new Set(boardKeys),h0=_K(hc[0]),h1=_K(hc[1]);
  if(used.has(h0)||used.has(h1))continue;used.add(h0);used.add(h1);
  const v0=_K(vc[0]),v1=_K(vc[1]);
  if(used.has(v0)||used.has(v1))continue;used.add(v0);used.add(v1);
  const comm=board.slice();let drawn=0,tries=0;
  while(drawn<need&&tries<200){const c=fullDeck[(Math.random()*52)|0],k=_K(c);if(!used.has(k)){used.add(k);comm.push(c);drawn++;}tries++;}
  if(drawn<need)continue;
  const hs=eval7(hc.concat(comm)),vs=eval7(vc.concat(comm));
  sum+=hs>vs?1:hs===vs?0.5:0;n++;}

// frazione di combo "nut" (doppia coppia+ / set / scala / colore) in un pool su questo board
function nutFrac(pool,board){if(!pool||!pool.length)return 0;let n=0,tot=0;for(const c of pool){tot++;if(madeScore(c,board)>=0.82)n++;}return tot?n/tot:0;}
// punteggio draw della mano (per scegliere i semi-bluff): flush draw, scala, overcard
function drawScore(hole,board){const all=hole.concat(board);
 const suits={};all.forEach(c=>suits[c.s]=(suits[c.s]||0)+1);const fd=Object.values(suits).some(n=>n>=4);
 const rs=[...new Set(all.map(c=>c.r))];if(rs.includes(14))rs.push(1);
 let oesd=false,gut=false;
 for(let lo=1;lo<=11;lo++){let c=0;for(let k=0;k<4;k++)if(rs.includes(lo+k))c++;if(c>=4)oesd=true;}
 for(let lo=1;lo<=10;lo++){let c=0;for(let k=0;k<5;k++)if(rs.includes(lo+k))c++;if(c>=4&&!oesd)gut=true;}
 const bmax=board.length?Math.max(...board.map(c=>c.r)):0;const over=hole.every(c=>c.r>bmax)?1:0;
 let s=0;if(fd)s+=2;if(oesd)s+=2;else if(gut)s+=1;s+=over;return s;}
// qualità come BLUFF in base ai blocker: blocchi il colore nut / i value dell'avversario = bluff migliore
function bluffQuality(hole,board){let q=0;const su={};board.forEach(c=>su[c.s]=(su[c.s]||0)+1);

  if((su[c.s]||0)>=3)q+=(c.r>=13?2:c.r>=11?1:0.5);          // blocker di colore (nut flush se hai l'asso/re del seme)
  if(c.r===14&&bmax!==14)q+=1;                                // asso: blocchi gli Ax di value su board non-A
  else if(c.r===13&&bmax<13)q+=0.5;                           // re: blocchi i Kx/top pair

function canonical(hole){let[a,b]=hole;if(a.r<b.r)[a,b]=[b,a];const hi=RANKS[a.r-2],lo=RANKS[b.r-2];

const UTG=["AA","KK","QQ","JJ","TT","99","88","77","66","55","44","33","22","AKs","AQs","AJs","ATs","A9s","A8s","A7s","A6s","A5s","A4s","A3s","A2s","KQs","KJs","KTs","QJs","QTs","JTs","T9s","98s","87s","76s","65s","AKo","AQo","AJo","KQo"];
const MP=[...UTG,"K9s","Q9s","J9s","T8s","97s","86s","75s","54s","ATo","KJo","QJo"];
const CO=[...MP,"K8s","K7s","K6s","K5s","Q8s","Q7s","J8s","T7s","96s","85s","64s","53s","43s","A9o","A8o","A7o","A5o","KTo","K9o","QTo","JTo","T9o"];
const BTN=[...CO,"K4s","K3s","K2s","Q6s","Q5s","Q4s","J7s","J6s","T6s","95s","84s","74s","A6o","A4o","A3o","A2o","K8o","K7o","Q9o","J9o","T8o","98o","87o","76o","65o"];
const SBr=[...CO,"K4s","K3s","K2s","Q6s","Q5s","J7s","T6s","95s","A6o","A4o","A3o","A2o","K8o","Q9o","J9o","T9o"];
const OPEN={UTG:new Set(UTG),MP:new Set(MP),CO:new Set(CO),BTN:new Set(BTN),SB:new Set(SBr),BB:new Set()};
function handStrength(h){const pair=h.length===2,r1=RANKS.indexOf(h[0]),r2=RANKS.indexOf(h[1]);

 s+=Math.max(0,(4-Math.abs(r1-r2)))*0.02;if(r1===12)s+=0.04;return Math.min(0.99,s);}
// 3-bet range per posizione dell'OPENER: tight vs early, larghi vs late (MPT cap. 05/08-09)
const TBV_UTG=["AA","KK","QQ","JJ","AKs","AKo","AQs"];
const TBV_MP=[...TBV_UTG,"TT","AQo"];
const TBV_CO=[...TBV_MP,"99","AJs","KQs"];
const TBV_BTN=[...TBV_CO,"88","ATs","KJs","AJo"];
const TBV_SB=[...TBV_BTN,"77","KTs","KQo","QJs"];

const TB_BLUFF={

 MP:new Set(["A5s","A4s","A3s","KJs","KQs","QTs","JTs","T9s","ATs"]),
 CO:new Set(["A5s","A4s","A3s","K9s","KJs","QTs","JTs","T9s","98s","ATs"]),
 BTN:new Set(["A5s","A4s","A3s","A2s","K9s","Q9s","QTs","J9s","JTs","T9s","98s","A5o","KJo"]),
 SB:new Set(["A5s","A4s","A3s","A2s","K9s","K8s","Q9s","J9s","JTs","T9s","98s","87s","A5o","A4o","KJo"])

function tbSets(openerPos){const val=TB_VALUE[openerPos]||TB_VALUE.CO;let blf=TB_BLUFF[openerPos]||TB_BLUFF.CO;

const OPENPCT={UTG:"15-16%",MP:"~19%",CO:"~27%",BTN:"~45%",SB:"~40%"};

function classifyBoard(board){if(board.length<3)return{txt:"",paired:false,flush:"rainbow",high:false,conn:0,wet:false};

 const paired=new Set(ranks).size<ranks.length;
 const sorted=[...new Set(ranks)].sort((a,b)=>a-b);let conn=0;for(let i=1;i<sorted.length;i++)if(sorted[i]-sorted[i-1]<=2)conn++;

 const wet=(flush!=="rainbow"&&board.length===3)||maxS>=3||conn>=2;
 let txt=paired?"board appaiato":(wet?"board bagnato":"board secco");txt+=high?" · high":" · low";if(flush!=="rainbow")txt+=" · "+flush;
 return{txt,paired,flush,high,conn,wet};}
function boardTexture(board){return classifyBoard(board).txt;}
// MDF/Alpha esatti: contro una bet, MDF = pot/(pot+bet), Alpha = bet/(pot+bet)
function mdfFor(g,toCall){const alpha=toCall/g.pot;return{alpha:Math.max(0,Math.min(1,alpha)),mdf:Math.max(0,Math.min(1,1-alpha))};}
// SPR = stack effettivo / pot
function sprFor(g){const act=g.players.filter(q=>!q.folded);const eff=Math.min(...act.map(q=>q.stack));return eff/Math.max(1,g.pot);}

// costruisce la chiave-nodo dallo storico preflop (g.pfActions) per chi deve agire (dmPos). null se non mappabile.
function gtoKeyFromActs(acts, dmPos){
  const entered=new Set(); const out=[]; let rc=0;
  for(const a of acts){
    if(a.kind==='raise'){ rc++; out.push(a.pos+'R'+rc); entered.add(a.pos); }
    else if(a.kind==='allin'){ rc++; out.push(a.pos+'A'+rc); entered.add(a.pos); }
    else if(a.kind==='call'){ out.push(a.pos+'C'); entered.add(a.pos); }
    else if(a.kind==='fold'){ if(entered.has(a.pos)) out.push(a.pos+'F'); } // i fold "freddi" sono omessi, come nel solver
    // 'check' e altre: ignorate (non sono nodi del solver)
  }
  out.push(dmPos);
  return out.join('/');
}
function gtoNodeKey(g, dmPos){ if(g.N!==6) return null; const acts=g.pfActions; if(!acts) return null; return gtoKeyFromActs(acts, dmPos); }
// Risolve il nodo GTO: esatto se presente, altrimenti mappa gli SQUEEZE (open + cold-call) sul nodo piu' vicino.
// In GTO 6-max solo il BTN flatta un open: quindi se una posizione non-standard calla, il nodo esatto non esiste.
// Strategia: un bui che squeeza -> nodo con caller=BTN; altrimenti -> nodo vs-open (caller ignorato). Ritorna {node,key,approx,why} o null.
function gtoResolve(g, heroPos){
  if(g.N!==6) return null; const acts=g.pfActions; if(!acts) return null;
  const exact=gtoKeyFromActs(acts, heroPos);
  if(GTO_PRE[exact]) return {node:GTO_PRE[exact], key:exact, approx:false, why:''};
  const raises=acts.filter(a=>a.kind==='raise'||a.kind==='allin');
  const callers=acts.filter(a=>a.kind==='call');
  if(raises.length===1 && callers.length>=1){           // open + uno o piu' cold-call = squeeze
    const opener=raises[0].pos;
    if((heroPos==='SB'||heroPos==='BB') && opener!=='BTN' && opener!=='SB'){
      const k=`${opener}R1/BTNC/${heroPos}`;
      if(GTO_PRE[k]) return {node:GTO_PRE[k], key:k, approx:true, why:'nodo GTO più vicino, caller=BTN'};
    }
    if(opener!==heroPos){
      const k2=`${opener}R1/${heroPos}`;
      if(GTO_PRE[k2]) return {node:GTO_PRE[k2], key:k2, approx:true, why:'nodo vs-open, caller ignorato'};
    }
  }
  return null;
}
function gtoRaiseCount(g){ let n=0; for(const a of (g.pfActions||[])) if(a.kind==='raise'||a.kind==='allin') n++; return n; }
function gtoRaiseLabel(rc){ return rc===0?'Open':rc===1?'3-bet':rc===2?'4-bet':rc>=3?'5-bet':'Raise'; }
function gtoIP(g,pos){ const ag=g.posName[g.aggressor]; if(!ag||ag===pos) return true; return (PI[pos]||0) > (PI[ag]||0); }
function gtoRecLabel(a){
  if(a.t==='raise') return /all-in/.test(a.lab) ? a.lab : `${a.lab} a ${(a.amount/BB).toFixed(1)}bb`;
  if(a.t==='call') return 'Call';
  if(a.t==='check') return 'Check';
  return 'Fold';
}
// Feedback preflop GTO. Ritorna {rec,why,alt,meta,close,note,freq} (verdetto/size lasciati al tail di feedback) o null se off-tree.
function gtoPreFeedback(g){
  const p=g.players[g.toAct], L=legal(g), hand=canonical(p.hole), pos=g.posName[p.i];
  const R=gtoResolve(g,pos); if(!R) return null;
  const node=R.node;
  const d=node.h[hand]||[0,0];
  const call=d[0], raise=d[1], fold=Math.max(0,100-call-raise);
  const rc=gtoRaiseCount(g);
  const isSqz=R.approx, rLab=isSqz?'Squeeze':gtoRaiseLabel(rc);
  const raiseAvail=!!(node.r||node.x), allin=!!node.x;
  let raiseAmt=null, raiseLabel='';
  if(raiseAvail){
    raiseAmt = allin ? L.maxRaiseTo : Math.max(L.minRaiseTo, Math.min(L.maxRaiseTo, Math.round((node.r||0)*BB)));
    raiseLabel = allin ? (rLab+' all-in') : rLab;
  }
  const acts=[];
  if(raiseAvail) acts.push({t:'raise', pct:raise, lab:raiseLabel, amount:raiseAmt});
  if((!!node.c && L.canCall) || call>0) acts.push({t:'call', pct:call, lab:'call'});
  acts.push({t: L.canCheck?'check':'fold', pct:fold, lab: L.canCheck?'check':'fold'});
  acts.sort((a,b)=>b.pct-a.pct);
  const top=acts[0], second=acts[1]?acts[1].pct:0;
  const mixed = second>=25;                              // spot genuinamente misto (piu' linee GTO)
  const rec={type:top.t, amount:top.amount, label:gtoRecLabel(top)};
  const alt=acts.filter(a=>a!==top && a.pct>=5).map(a=>a.t);
  const close=mixed && alt.length>0;
  const freq=acts.filter(a=>a.pct>=1).map(a=>`${a.lab} ${Math.round(a.pct)}%`).join(' · ');
  // testo contestuale
  let situ;
  if(isSqz) situ=`squeeze vs apertura da ${g.posName[g.aggressor]||''}`;
  else if(rc===0) situ=`apertura da ${pos}`;
  else { const aggPos=g.posName[g.aggressor]||''; const vs=rc===1?'open':rc===2?'3-bet':rc===3?'4-bet':'raise'; situ=`vs ${vs} da ${aggPos}`; }
  const ip=gtoIP(g,pos);
  const sizeTxt=(raiseAvail&&!allin)?` · size GTO ${node.r}bb`:'';
  const meta=`${situ}${rc>0?` · sei ${ip?'IP':'OOP'}`:''}${sizeTxt} · fonte: solver GTO (qb 100bb)${isSqz?' · ≈ approssimato ('+R.why+')':''}`;
  let why;
  if(isSqz)                 why=`${hand} (squeeze vs ${g.posName[g.aggressor]||''}): il GTO puro non copre lo spot (caller non standard) → mappato sul nodo più vicino. Linea indicata: ${freq}.`;
  else if(top.pct>=92 && !mixed) why=`${hand}: ${top.lab} ${Math.round(top.pct)}% — linea GTO pura (${situ}).`;
  else if(mixed)            why=`${hand}: spot misto — ${freq}. Tutte linee GTO del solver: gioca a frequenza (entrambe corrette).`;
  else                      why=`${hand}: il solver gioca ${freq}. ${top.lab} e' l'azione principale; le altre sono mix minori.`;
  return {rec, why, alt, meta, close, note:'', freq, src: isSqz?'approx':'exact', recRaises: acts.filter(a=>a.t==='raise'&&a.pct>=1).map(a=>a.amount)};
}

/* ===================== GTO POSTFLOP (libreria TexasSolver, file compagno GTO_postflop.js) =====================
   window.GTO_POST = { "<scenario>": {oop,ip,pot, f:{ "<canonFlopKey>": <albero> }} }
   Albero nodo: {p:player, a:[label azioni], s:{combo canonico:[freq%]}, c:{label:figlio}}; foglie {deal:n}.
   FLOP, heads-up. Match esatto per isomorfismo di colore (verde); fuori -> flop piu' simile per categoria (giallo). */
const GTO_POST = (typeof window!=='undefined' && window.GTO_POST) ? window.GTO_POST : {};
const _PR="23456789TJQKA";
function _pmRanksOfSuit(b,s){return b.filter(c=>c.s===s).map(c=>c.r).sort((a,b)=>b-a);}
function pmSuitMap(board){const su=[0,1,2,3];
  su.sort((x,y)=>{const rx=_pmRanksOfSuit(board,x),ry=_pmRanksOfSuit(board,y);
    if(rx.length!==ry.length)return ry.length-rx.length;
    for(let i=0;i<rx.length;i++)if(rx[i]!==ry[i])return ry[i]-rx[i];return x-y;});
  const m={};su.forEach((s,i)=>m[s]="abcd"[i]);return m;}
function _pmCard(c,m){return _PR[c.r-2]+m[c.s];}
function pmBoardKey(board,m){const cs=board.map(c=>_pmCard(c,m));
  cs.sort((a,b)=>{const ra=_PR.indexOf(a[0]),rb=_PR.indexOf(b[0]);if(ra!==rb)return rb-ra;return a[1]<b[1]?-1:1;});
  return cs.join("");}
function pmCombo(c1,c2,m){let a=_pmCard(c1,m),b=_pmCard(c2,m);
  const ra=_PR.indexOf(a[0]),rb=_PR.indexOf(b[0]);
  if(ra<rb||(ra===rb&&a[1]<b[1])){const t=a;a=b;b=t;}return a+b;}

// --- v2: flop piu' simile + media per categoria ---
function gtoFlopCards(key){const out=[];for(let i=0;i<key.length;i+=2)out.push({r:_PR.indexOf(key[i])+2,s:"abcd".indexOf(key[i+1])});return out;}
function gtoFlopSig(cards){const ranks=cards.map(c=>c.r).sort((a,b)=>b-a);
  const su={};cards.forEach(c=>su[c.s]=(su[c.s]||0)+1);const mx=Math.max(...Object.values(su));
  const suit=mx>=3?'m':mx===2?'t':'r';const uniq=new Set(ranks).size;
  const pair=uniq===1?'3':uniq===2?'2':'1';return {ranks,suit,pair};}
function gtoNearestFlop(board,keys){const ds=gtoFlopSig(board);let best=null,bd=1e9;
  for(const k of keys){const ls=gtoFlopSig(gtoFlopCards(k));
    if(ls.suit!==ds.suit||ls.pair!==ds.pair)continue;
    const d=Math.abs(ls.ranks[0]-ds.ranks[0])+Math.abs(ls.ranks[1]-ds.ranks[1])+Math.abs(ls.ranks[2]-ds.ranks[2]);
    if(d<bd){bd=d;best=k;}}
  return best;}
function gtoHandCat(hole,board){const ms=madeScore(hole,board);
  if(ms>=0.80)return 'strong';if(ms>=0.50)return 'pairA';if(ms>=0.28)return 'pairB';
  return drawScore(hole,board)>=3?'draw':'air';}
function gtoCatAvg(node,libCards,cat){const N=node.a.length;let sums=new Array(N).fill(0),n=0;
  for(const combo in node.s){
    const c1={r:_PR.indexOf(combo[0])+2,s:"abcd".indexOf(combo[1])};
    const c2={r:_PR.indexOf(combo[2])+2,s:"abcd".indexOf(combo[3])};
    if(gtoHandCat([c1,c2],libCards)!==cat)continue;
    const fr=node.s[combo];for(let i=0;i<N;i++)sums[i]+=fr[i];n++;}
  return n?sums.map(x=>x/n):null;}

// scenario preflop -> chiave libreria (6-max, heads-up postflop). null se non riconosciuto.
function gtoPostScenario(g){
  if(g.N!==6) return null;
  const live=g.players.filter(p=>!p.folded);
  if(live.length!==2) return null;
  const acts=(g.pfActions||[]);
  const raises=acts.filter(a=>a.kind==='raise'||a.kind==='allin');
  const calls=acts.filter(a=>a.kind==='call');
  let scen=null;
  if(raises.length===1 && calls.length===1){
    const op=raises[0].pos, ca=calls[0].pos;
    if(ca==='BB' && ['UTG','MP','CO','BTN'].includes(op)) scen=`SRP_${op}_vs_BBcall`;
    else if(op==='SB' && ca==='BB') scen='SRP_SB_vs_BBcall';
    else if(ca==='BTN' && ['UTG','MP','CO'].includes(op)) scen=`SRP_${op}_vs_BTNflat`;
  } else if(raises.length===2 && calls.length===1){
    const op=raises[0].pos, tb=raises[1].pos, ca=calls[0].pos;
    if(tb==='BB' && ca===op && ['CO','BTN'].includes(op)) scen=`3BET_${op}_vs_BB3b`;
  }
  if(!scen || !GTO_POST[scen]) return null;
  return scen;
}
function gtoMatchChild(node, a){
  if(!node || !node.c) return null;
  if(a.kind==='X' && node.c['X']) return 'X';
  if(a.kind==='F' && node.c['F']) return 'F';
  if(a.kind==='C' && node.c['C']) return 'C';
  if(a.kind==='B'){
    if(a.allin && node.c['A']) return 'A';
    let best=null,bd=1e9;
    for(const k of Object.keys(node.c)){
      let pct=null;
      if(k==='A') pct=200; else if(k[0]==='B'||k[0]==='R') pct=+k.slice(1);
      if(pct==null) continue;
      const d=Math.abs(pct - (a.frac||0)*100);
      if(d<bd){bd=d;best=k;}
    }
    return best;
  }
  return null;
}
function _gtoNav(node, post){for(const a of (post||[])){const k=gtoMatchChild(node,a);if(!k)return null;node=node.c[k];if(!node||node.deal!==undefined)return null;}return node;}
// risolve il nodo GTO postflop per la decisione attuale dell'eroe. {actions,freqs,exact,scen} o null.
function gtoPostResolve(g){
  if(g.board.length!==3) return null;                 // FLOP only
  const scen=gtoPostScenario(g); if(!scen) return null;
  const lib=GTO_POST[scen];
  const hero=g.players[g.toAct]; if(!hero || !hero.hole) return null;
  const m=pmSuitMap(g.board), fk=pmBoardKey(g.board,m);
  let node=lib.f[fk];
  if(node){                                           // ESATTO (isomorfismo colore)
    node=_gtoNav(node, g.postActions); if(!node || !node.s || !node.a) return null;
    const combo=pmCombo(hero.hole[0],hero.hole[1],m);
    const fr=node.s[combo]; if(!fr) return null;
    return {actions:node.a, freqs:fr, exact:true, scen};
  }
  const lf=gtoNearestFlop(g.board, Object.keys(lib.f)); if(!lf) return null;  // FLOP PIU' SIMILE
  let n2=_gtoNav(lib.f[lf], g.postActions); if(!n2 || !n2.s || !n2.a) return null;
  const cat=gtoHandCat(hero.hole, g.board);
  const avg=gtoCatAvg(n2, gtoFlopCards(lf), cat); if(!avg) return null;
  return {actions:n2.a, freqs:avg, exact:false, scen, libFlop:lf};
}
function gtoPostActionInfo(label, g, p){
  if(label==='X') return {t:'check', lab:'check'};
  if(label==='C') return {t:'call',  lab:'call'};
  if(label==='F') return {t:'fold',  lab:'fold'};
  if(label==='A'){const L=legal(g);return {t:'raise', lab:'all-in', amount:L.maxRaiseTo};}
  if(label[0]==='B'||label[0]==='R'){const pct=+label.slice(1);
    const L=legal(g);const amt=Math.max(L.minRaiseTo,Math.min(L.maxRaiseTo,Math.round(g.pot*pct/100)+p.street));
    return {t:'raise', lab:`${label[0]==='R'?'raise':'bet'} ${pct<55?'⅓':'¾'}`, amount:amt, pct};}
  return {t:'check', lab:label};
}

  const acts=R.actions.map((lb,i)=>{const info=gtoPostActionInfo(lb,g,p);return {t:info.t, lab:info.lab, amount:info.amount, pct:R.freqs[i]||0};});
  acts.sort((a,b)=>b.pct-a.pct);
  const top=acts[0], second=acts[1]?acts[1].pct:0;
  const mixed=second>=25;
  const rec={type:top.t, amount:top.amount, label: top.t==='raise'?(/all-in/.test(top.lab)?'All-in':`${top.lab} (~${Math.round((top.amount-p.street)/Math.max(1,g.pot)*100)}% pot)`):(top.t==='call'?'Call':top.t==='fold'?'Fold':'Check')};
  const alt=acts.filter(a=>a!==top && a.pct>=5).map(a=>a.t).filter((v,i,arr)=>arr.indexOf(v)===i);
  const close=mixed && alt.length>0;
  const freq=acts.filter(a=>a.pct>=1).map(a=>`${a.lab} ${Math.round(a.pct)}%`).join(' · ');
  const made=handName(eval7(p.hole.concat(g.board)));
  const meta=`postflop GTO · ${R.scen.replace(/_/g,' ')} · flop · fonte: solver TexasSolver${R.exact?'':' · ≈ flop più simile'}`;
  let why;
  if(!R.exact) why=`${made}: flop fuori libreria → mappato sul flop GTO più simile, media per categoria. Indicazione: ${freq}.`;
  else if(top.pct>=92 && !mixed) why=`${made}: ${top.lab} ${Math.round(top.pct)}% — linea GTO pura del solver (flop).`;
  else if(mixed) why=`${made}: spot misto — ${freq}. Tutte linee GTO del solver: gioca a frequenza.`;
  else why=`${made}: il solver gioca ${freq}. ${top.lab} principale.`;
  const allowed=[rec.type,...alt];
  let verdict;
  if(allowed.includes(heroAction.type)) verdict = close?'mixed':(heroAction.type===rec.type?'ottimo':'ok');
  else verdict='errore';
  return {rec, verdict, why, meta, close, note:'', freq, bars:null, alt, gtoSrc: R.exact?'exact':'approx', recRaises: acts.filter(a=>a.t==='raise'&&a.pct>=1).map(a=>a.amount)};
}

   meta+=` · pot odds ${(po*100).toFixed(0)}% · MDF ${(M.mdf*100).toFixed(0)}%`+((impl||rimpl)?` · soglia eff. ${(reqEq*100).toFixed(0)}%`:'');
   if(eq>reqEq+0.20&&eq>0.72+sprMod*0.7&&L.canRaise){rec={type:'raise',amount:Math.round(g.pot+L.toCall)+p.street,label:isRiver?'Raise for value (~pot)':'Check-raise for value'};
    why=`${made} (bucket ${buck}), equity ~${(eq*100).toFixed(0)}% molto sopra il prezzo (${(po*100).toFixed(0)}%): ${isRiver?"raise for value, ti pagano peggio.":"check-raise per value e protezione invece di solo callare."} SPR ${spr.toFixed(1)}.`;}
   else if(madeStrong&&eq>reqEq-(isRiver?0:0.05)){rec={type:'call',label:'Call'};close=(eq<reqEq+0.05);
    if(!isRiver&&B.wet&&L.canRaise){if(!alt.includes('raise'))alt.push('raise');note=`Mano fatta forte su board dinamico (${B.txt}): spesso meglio raise per protezione/value invece del solo call.`;}
    why=`${made}: mano fatta (doppia coppia+) con equity ~${(eq*100).toFixed(0)}% ${eq>reqEq?'sopra':'vicino alla'} soglia ${(reqEq*100).toFixed(0)}% → call: batti draw e bluff. ${(!isRiver&&B.wet)?"Su board bagnato considera il raise.":""}`;}
   else{
    const closeSpot=Math.abs(eq-reqEq)<0.06&&eq<=0.7;if(closeSpot)close=true;
    if(!isRiver&&L.canRaise&&((B.wet&&eq>0.42&&eq<0.62)||draws>=3)){if(!alt.includes('raise'))alt.push('raise');if(!note)note=`Su ${B.txt} con equity ~${(eq*100).toFixed(0)}%${draws>=3?` e un draw forte (punteggio ${draws})`:''} il raise semi-bluff è un'alternativa al call: outs per migliorare + fold equity. Mixabile.`;if(!freq)freq="call ~60% · raise (semi-bluff) ~40%";}
    if(eq>reqEq+0.02){rec={type:'call',label:'Call'};if(closeSpot){if(!freq)freq="call ~55% · fold ~45%";if(!alt.includes('fold'))alt.push('fold');note=note||`Spot vicino: equity ~${(eq*100).toFixed(0)}% ≈ soglia ${(reqEq*100).toFixed(0)}%. Per lo più call, a volte fold — decidono implied odds, blocker e read.`;}why=`Difesa (bucket ${buck}): contro questa size la MDF del tuo range è ${(M.mdf*100).toFixed(0)}% (Alpha ${(M.alpha*100).toFixed(0)}%). Equity ~${(eq*100).toFixed(0)}%${impl?` + implied odds (soglia scesa a ${(reqEq*100).toFixed(0)}%)`:''} > prezzo → call +EV.`;}
    else{rec={type:'fold',label:'Fold'};if(closeSpot){freq="fold ~55% · call ~45%";if(!alt.includes('call'))alt.push('call');note=`Spot vicino: equity ~${(eq*100).toFixed(0)}% ≈ soglia ${(reqEq*100).toFixed(0)}%. Per lo più fold, a volte call — decidono implied odds, blocker e read.`;}why=`Difesa (bucket ${buck}): equity ~${(eq*100).toFixed(0)}% < soglia ${(reqEq*100).toFixed(0)}%${rimpl?` (alzata per reverse-implied: coppia dominabile)`:''} (Alpha ${(M.alpha*100).toFixed(0)}%). Sotto soglia → fold. Difendi le mani migliori, non questa.`;}
   }
  }
 }
 const allowed=[rec.type,...alt];let verdict;
 if(allowed.includes(heroAction.type)){
   if(close)verdict='mixed';                          // spot a più linee corrette
   else verdict=(heroAction.type===rec.type)?'ottimo':'ok';
 } else verdict='errore';
 // ---- controllo SIZE: azione giusta ma dimensione sbagliata ----
 if(heroAction.type==='raise'&&rec.type==='raise'&&allowed.includes('raise')&&typeof rec.amount==='number'&&typeof heroAction.amount==='number'){
   // l'importo ideale non può superare lo stack: lo limito al massimo legale (altrimenti uno shove all-in verrebbe segnato "troppo piccolo")
   const recBet=Math.min(rec.amount,L.maxRaiseTo)-p.street,heroBet=heroAction.amount-p.street;
   if(recBet>0&&heroBet>0&&g.pot>0){const ratio=heroBet/recBet,pf=g.street===0;
     let loTol=pf?0.6:0.65,hiTol=pf?1.7:1.55,loBad=pf?0.4:0.45,hiBad=pf?3:2.3;
     if(multiSize){hiTol*=1.5;hiBad*=1.3;loTol*=0.9;} // PUNTO 6: accetta la seconda size GTO (di norma più grande/overbet); puntine troppo piccole restano errore
     const recTxt=pf?`${(Math.min(rec.amount,L.maxRaiseTo)/BB).toFixed(1)}bb`:`${Math.round(recBet/g.pot*100)}% pot`;
     const heroTxt=pf?`${(heroAction.amount/BB).toFixed(1)}bb`:`${Math.round(heroBet/g.pot*100)}% pot`;
     if(ratio<loBad||ratio>hiBad){verdict='errore';
       why+=` ⚠️ Size sbagliata: hai scelto ${heroTxt}, ma qui la size corretta è ~${recTxt} (${rec.label}). ${ratio>1?"Troppo grande: ti esponi a rilanci e fai foldare le mani che vorresti far pagare.":"Troppo piccola: non proteggi l'equity né massimizzi il value."}`;}
     else if(ratio<loTol||ratio>hiTol){if(verdict==='ottimo'||verdict==='mixed')verdict='ok';
       why+=` Nota size: hai puntato ${heroTxt} contro ~${recTxt} consigliato — linea giusta ma sizing non ideale.`;}
   }
 }
 if(g.street===0&&!_gp&&g.N===6&&g.currentBet>BB){meta+=(meta?' · ':'')+'⚠️ spot fuori dall’albero del solver — euristica';}
 const gtoSrc=(g.street===0&&_gp)?(_gp.src||'exact'):'heuristic';
 return {rec,verdict,why,meta,close,note,freq,bars,alt,gtoSrc,recRaises:_recRaises||((rec.type==='raise'&&typeof rec.amount==='number')?[rec.amount]:[])};}

// posizioni calcolate attorno all'ovale per qualsiasi numero di giocatori (hero=slot 0 in basso)
const RX=43,RY=39,CX=50,CY=46;
function ringDims(){const w=window.innerWidth||document.documentElement.clientWidth||1000;
 if(w<=480)return{RX:40,RY:31,CX:50,CY:47};
 if(w<=860)return{RX:41,RY:40,CX:50,CY:46};
 return{RX:43,RY:39,CX:50,CY:46};}
function ringXY(slot,N,fx,fy){const d=ringDims();const phi=(270-slot*(360/N))*Math.PI/180;return {l:(d.CX+d.RX*fx*Math.cos(phi)).toFixed(1)+'%',t:(d.CY-d.RY*fy*Math.sin(phi)).toFixed(1)+'%'};}
function seatXY(slot,N){return ringXY(slot,N,1,1);}
function betXY(slot,N){const m=window.innerWidth<=480;return ringXY(slot,N,m?0.46:0.56,m?0.44:0.5);}
function dealerXY(slot,N){const m=window.innerWidth<=480;return ringXY(slot,N,m?0.74:0.72,m?0.82:0.66);}

/* ===== LEAK TRACKING PERSISTENTE (localStorage, per-dispositivo) ===== */
const LEAK_KEY='gto_leak_v1';
let leakOK=true;
function loadLeak(){try{const raw=localStorage.getItem(LEAK_KEY);if(raw)return JSON.parse(raw);}catch(e){leakOK=false;}
 return {byKey:{},byPos:{},total:{d:0,s:0}};}
let leak=loadLeak();
function saveLeak(){if(!leakOK)return;try{localStorage.setItem(LEAK_KEY,JSON.stringify(leak));}catch(e){leakOK=false;}}
function decisionCategory(gs){const pos=gs.posName[gs.heroSeat];
 if(gs.street===0){const raised=gs.currentBet>BB;return {key:raised?'Preflop · vs raise':'Preflop · RFI/open',pos};}
 const sname=['','','','Flop','Turn','River'][gs.board.length];
 const facing=gs.players[gs.heroSeat].street<gs.currentBet;
 return {key:sname+(facing?' · vs bet (difesa)':' · in azione'),pos};}
function recordLeak(gs,verdict){const pts=(verdict==='ottimo'||verdict==='mixed')?1:verdict==='ok'?0.5:0;
 const{key,pos}=decisionCategory(gs);
 (leak.byKey[key]=leak.byKey[key]||{d:0,s:0});leak.byKey[key].d++;leak.byKey[key].s+=pts;
 (leak.byPos[pos]=leak.byPos[pos]||{d:0,s:0});leak.byPos[pos].d++;leak.byPos[pos].s+=pts;
 leak.total.d++;leak.total.s+=pts;saveLeak();}
function pct(o){return o&&o.d?Math.round(o.s/o.d*100):null;}

  const ava=(p.name||'?').replace(/[^A-Za-z0-9]/g,'').slice(0,2).toUpperCase()||'P';
  el.innerHTML=`<div class="cards">${cardsHTML}</div>
   <div class="plate ${p.isHero?'hero':''} ${isTurn?'turn':''} ${p.folded?'out':''} ${isWin?'winner':''}">
    <div class="ava">${p.isHero?'★':ava}</div>
    <div class="info">
     <div class="nm">${p.name} <span class="posb">${g.posName?g.posName[p.i]:''}</span>${!p.isHero&&p.profile&&mode!=='analyze'?`<span class="ptag pt-${p.profile}">${PROFILES[p.profile].tag}</span>`:''}</div>
     <div class="stk">${(p.stack/BB).toFixed(0)}bb</div>
     <div class="act ${actCls}">${win?('+'+win.amount+(win.score?' · '+handName(win.score):'')):(p.lastAction||'')}</div>
    </div>
   </div>`;
  seatsEl.appendChild(el);
  if(p.street>0&&!g.handOver){const bp=betXY(slot,g.N);const b=document.createElement('div');b.className='bet';b.style.top=bp.t;b.style.left=bp.l;b.textContent=(p.street/BB).toFixed(1)+'bb';betsEl.appendChild(b);}
 }
 // dealer button
 const dz=$('dealer');const bp=dealerXY(vslot(g.button),g.N);
 let _dl=parseFloat(bp.l);
 // telefono: per i posti centrali (hero/top-center) sposta il bottino di lato così non finisce sulle carte
 if(window.innerWidth<=480&&Math.abs(_dl-50)<8)_dl-=9;
 dz.style.display='block';dz.style.top=bp.t;dz.style.left=_dl+'%';
 // result line
 if(g.handOver){const w=g.winners.map(x=>g.players[x.i].name).join(', ');
  $('result').textContent=`Mano finita · vince ${w}`;}
 else $('result').textContent='';
 // stats (solo se presenti — modalità allenamento rimossa)
 const sh=$('s-hands');if(sh)sh.textContent=stats.hands;
 const ts=$('tbl-size');if(ts)ts.textContent=g.N===2?'heads-up':g.N+'-max';
 const sa=$('s-acc');if(sa)sa.textContent=stats.decisions?Math.round(stats.score/stats.decisions*100)+'%':'—';
 const ss=$('s-stack');if(ss)ss.textContent=(stats.bb>=0?'+':'')+stats.bb.toFixed(1);

 const L=legal(g);const p=g.players[g.heroSeat];

function syncRaiseVal(){const v=+$('raiseslider').value;$('raiseval').textContent=`→ ${v} (${(v/BB).toFixed(1)}bb)`;}
function buildSizeBtns(L){const p=g.players[g.heroSeat];const box=$('sizebtns');box.innerHTML='';

  if(g.currentBet<=BB){opts.push(['2.5bb',5],['3bb',6]);}

function submitHero(action){
 if(busy)return;
 // compute feedback BEFORE applying
 const fb=feedback(g,action);
 stats.decisions++;stats.score+=(fb.verdict==='ottimo'||fb.verdict==='mixed'?1:fb.verdict==='ok'?0.5:0);
 recordLeak(g,fb.verdict); // persistente (categoria calcolata sullo stato pre-azione)
 renderFeedback(fb);
 // apply hero action, then pause until "continua"
 const before=g.street,prevBets=collectBets();
 apply(g,action);
 if(g.street>before)flyChipsToPot(prevBets);
 pending=true;busy=true;
 clearActionUI();render();
}
function renderFeedback(fb){
 const el=$('fb');el.className='fb show v-'+fb.verdict;
 $('fb-verdict').textContent=fb.verdict==='ottimo'?'Scelta ottima':fb.verdict==='mixed'?'Spot mixed — linea corretta':fb.verdict==='ok'?'Giocabile':'Errore';
 $('fb-rec').textContent=fb.rec.label;
 // spiegazione minimal: una riga (prima frase) + eventuale avviso sulla size
 let w=fb.why||'',warn='';const wi=w.indexOf('⚠️');
 if(wi>=0){warn=w.slice(wi).trim();w=w.slice(0,wi).trim();}
 const fd=w.search(/\.\s/);if(fd>0)w=w.slice(0,fd+1);
 $('fb-why').textContent=(w+(warn?'  '+warn:'')).trim();
 $('fb-meta').textContent=fb.meta||'';
 // barre equity / prezzo / MDF
 const bb=$('fb-bars');
 if(fb.bars&&typeof fb.bars.eq==='number'){
   const eqp=Math.round(fb.bars.eq*100);
   const ahead=(typeof fb.bars.po==='number')?fb.bars.eq>=fb.bars.po:fb.bars.eq>=0.5;
   let h=`<div class="barrow"><span class="barlab">La tua equity</span><div class="bartrack"><div class="barfill ${ahead?'eq':'eqlow'}" style="width:${eqp}%"></div>`;
   if(typeof fb.bars.po==='number'){h+=`<div class="barmark" style="left:${Math.round(fb.bars.po*100)}%"></div>`;}
   h+=`</div><span class="barval">${eqp}%</span></div>`;
   if(typeof fb.bars.po==='number'){const pop=Math.round(fb.bars.po*100);h+=`<div class="barrow"><span class="barlab">Prezzo (pot odds)</span><div class="bartrack"><div class="barfill po" style="width:${pop}%"></div></div><span class="barval">${pop}%</span></div>`;}
   if(typeof fb.bars.mdf==='number'){const m=Math.round(fb.bars.mdf*100);h+=`<div class="barrow"><span class="barlab">MDF del range</span><div class="bartrack"><div class="barfill mdf" style="width:${m}%"></div></div><span class="barval">${m}%</span></div>`;}
   bb.innerHTML=h;bb.style.display='flex';
 } else bb.style.display='none';
 // barra frequenze (stima)
 const ff=$('fb-freq');
 if(fb.freq){
   const segs=fb.freq.split('·').map(s=>s.trim()).map(s=>{const m=s.match(/(.+?)~?\s*(\d+)\s*%/);return m?{lab:m[1].trim(),pct:+m[2]}:null;}).filter(Boolean);
   const colOf=l=>/fold|give/i.test(l)?'g':/call/i.test(l)?'b':/check/i.test(l)?'t':'d';
   let bar='',leg='';
   for(const s of segs){bar+=`<div class="fseg c-${colOf(s.lab)}" style="width:${s.pct}%">${s.pct>=14?s.pct+'%':''}</div>`;leg+=`<span class="fleg"><i class="c-${colOf(s.lab)}"></i>${s.lab} ${s.pct}%</span>`;}
   ff.innerHTML=`<div class="freqlabel">Frequenze GTO (stima)</div><div class="fbar">${bar}</div><div class="flegwrap">${leg}</div>`;
   ff.style.display='block';
 } else ff.style.display='none';
 const nb=$('fb-note');nb.style.display='none';
}

/* ===== animazioni fiche ===== */
function collectBets(){return g.players.filter(p=>p.street>0&&!p.folded).map(p=>({slot:vslot(p.i),amount:p.street}));}
function flyChipsToPot(prevBets){if(!prevBets||!prevBets.length)return;const layer=$('fxlayer');
 prevBets.forEach(pb=>{const bp=betXY(pb.slot,g.N);const c=document.createElement('div');c.className='flychip';
  c.style.top=bp.t;c.style.left=bp.l;c.textContent=pb.amount;layer.appendChild(c);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{c.style.top='40%';c.style.left='50%';c.style.opacity='0';c.style.transform='translate(-50%,-50%) scale(.6)';}));
  setTimeout(()=>c.remove(),560);});}
function flyPotToWinners(winners){const layer=$('fxlayer');
 winners.forEach(w=>{const slot=vslot(w.i),sp=seatXY(slot,g.N);const c=document.createElement('div');c.className='flychip';
  c.style.top='40%';c.style.left='50%';c.textContent='+'+w.amount;layer.appendChild(c);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{c.style.top=sp.t;c.style.left=sp.l;c.style.opacity='0';c.style.transform='translate(-50%,-50%) scale(.85)';}));
  setTimeout(()=>c.remove(),720);});}

function loop(){ // drive bots until hero turn / hand end
 if(busy)return;
 if(g.handOver){onHandOver();return;}
 if(g.toAct===g.heroSeat){render();heroTurn();return;}
 // bot acts
 busy=true;render();
 setTimeout(()=>{const before=g.street,prevBets=collectBets();const a=botAction(g);apply(g,a);
  if(g.street>before)flyChipsToPot(prevBets);
  busy=false;render();loop();},620);
}
function onHandOver(){
 render();clearActionUI();
 // settle session bb for hero
 const delta=(g.players[g.heroSeat].stack-STACK)/BB;
 stats.bb+=delta;stats.hands++;
 render();
 if(g.winners&&g.winners.length)flyPotToWinners(g.winners);
 // auto next after delay
 clearTimeout(window._nh);window._nh=setTimeout(()=>{nextHand();},2900);
}
function nextHand(){clearTimeout(window._nh);startHand(g);pending=null;busy=false;
 $('fb').classList.remove('show');render();
 // small delay then run
 setTimeout(loop,300);}

/* ===== REPORT LEAK ===== */
function renderReport(){const body=$('report-body');
 if(!leakOK){body.innerHTML='<p class="rempty">Il salvataggio permanente non è disponibile in questo browser (succede in alcune configurazioni quando apri il file localmente). Le statistiche di sessione funzionano comunque in alto.</p>';return;}
 if(!leak.total.d){body.innerHTML='<p class="rempty">Nessuna decisione registrata ancora. Gioca qualche mano e torna qui: vedrai la tua precisione divisa per situazione e posizione, con evidenziati i tuoi leak principali.</p>';return;}
 const order=['Preflop · RFI/open','Preflop · vs raise','Flop · vs bet (difesa)','Flop · in azione','Turn · vs bet (difesa)','Turn · in azione','River · vs bet (difesa)','River · in azione'];
 const keys=Object.keys(leak.byKey).sort((a,b)=>(order.indexOf(a)+99*(order.indexOf(a)<0))-(order.indexOf(b)+99*(order.indexOf(b)<0)));
 // find weakest with >=8 samples
 let worst=null;for(const k of keys){const o=leak.byKey[k];if(o.d>=8){const p=pct(o);if(worst===null||p<worst.p)worst={k,p};}}
 const bar=p=>{const col=p>=75?'var(--ok)':p>=55?'var(--mid)':'var(--bad)';return `<div class="rbar"><div style="width:${p}%;background:${col}"></div></div>`;}
 let h=`<div class="rrow rhead"><span>Situazione</span><span>Decisioni</span><span>Precisione</span></div>`;
 for(const k of keys){const o=leak.byKey[k],p=pct(o),flag=worst&&worst.k===k?' <span class="leakflag">leak</span>':'';
  h+=`<div class="rrow"><span>${k}${flag}</span><span class="mono">${o.d}</span><span class="mono">${p}% ${bar(p)}</span></div>`;}
 h+=`<div class="rsub">Per posizione</div><div class="rposwrap">`;
 for(const pos of ['UTG','MP','CO','BTN','SB','BB']){const o=leak.byPos[pos];if(!o)continue;const p=pct(o);
  h+=`<span class="rpos"><b>${pos}</b> ${p}% <small>(${o.d})</small></span>`;}
 h+=`</div><div class="rtot">Totale: <b>${leak.total.d}</b> decisioni · precisione complessiva <b>${pct(leak.total)}%</b></div>`;

const GRID="AKQJT98765432";

function renderRangeGrid(){
 const pos=g.posName[g.heroSeat],raised=g.street===0&&g.currentBet>BB;
 const heroHand=(!g.players[g.heroSeat].folded&&g.players[g.heroSeat].hole&&g.street===0)?canonical(g.players[g.heroSeat].hole):null;
 // BB non apre mai: per il BB (o quando sei di fronte a un raise) mostra il range di DIFESA (call + 3-bet)
 const defenseMode = (pos==='BB'||raised);
 let inSet,tbSet,title,note;
 if(defenseMode){
   const opp=raised?(g.posName[g.aggressor]||'BTN'):'BTN'; // se non c'è raise live, mostra vs BTN (rappresentativo)
   const oppRk=rangeKey(opp);
   const {val,blf}=tbSets(oppRk);tbSet=new Set([...val,...blf]); // 3-bet vs questo opener
   inSet=new Set(CALL_ARR.filter(h=>!tbSet.has(h)));      // call (esclude le mani da 3-bet)
   title=`Range di difesa · ${pos} vs open da ${opp}`;
   note=`Difesa vs un open da <b>${opp}</b>: <b style="color:var(--ok)">verde = call</b>, <b style="color:var(--gold)">oro = 3-bet</b> (${TB3PCT[oppRk]||""}), resto = fold. ${pos==='BB'?'Il BB non apre mai (non è first-in): qui vedi come difende. ':''}Il range di 3-bet si stringe contro aperture early e si allarga contro le late${raised?'':' — non essendo di fronte a un raise reale, mostro il riferimento vs BTN'}.`;
 } else {
   inSet=OPEN[rangeKey(pos)]||new Set();tbSet=new Set();
   title=`Range di apertura (RFI) · ${pos}`;
   note=`<b style="color:var(--ok)">Verde</b> = mani con cui apri (RFI) da ${pos}, circa ${OPENPCT[rangeKey(pos)]||''} delle mani. ${heroHand?`La tua mano (${heroHand}) è evidenziata.`:''}`;
 }
 $('range-title').textContent=title;
 let h='';
 for(let r=0;r<13;r++)for(let c=0;c<13;c++){const lab=gridLabel(r,c);
  const isTb=tbSet.has(lab),isIn=inSet.has(lab),cur=heroHand===lab;
  const cls='rc'+(r===c?' pair':r<c?' suited':' offsuit')+(isTb?' tb':isIn?' in':' out')+(cur?' cur':'');
  h+=`<div class="${cls}">${lab}</div>`;}

function raisePresets(L,p){const out=[];
 if(g.street===0){if(g.currentBet<=BB){out.push(['Raise 2.5x',5],['Raise 3x',6]);}else{out.push(['Re-raise 3x',Math.round(g.currentBet*3)],['Re-raise 4x',Math.round(g.currentBet*4)]);}}
 else{out.push(['Bet 33%',Math.round(g.pot*0.33)+p.street],['Bet 50%',Math.round(g.pot*0.5)+p.street],['Bet 75%',Math.round(g.pot*0.75)+p.street],['Pot',g.pot+p.street]);}
 out.push(['All-in',L.maxRaiseTo]);
 const seen=new Set(),res=[];for(let[lab,v]of out){v=Math.max(L.minRaiseTo,Math.min(L.maxRaiseTo,Math.round(v)));if(seen.has(v))continue;seen.add(v);res.push([lab,v]);}return res;}
function buildActBtns(L,isHero){const box=$('an-actbtns');box.innerHTML='';const p=g.players[g.toAct];
 const mk=(lab,cls,fn)=>{const b=document.createElement('button');b.className='abtn '+cls;b.textContent=lab;b.onclick=fn;box.appendChild(b);};
 if(L.toCall>0)mk('Fold','af',()=>applyAct({type:'fold'}));
 if(L.canCheck)mk('Check','ac',()=>applyAct({type:'check'}));
 if(L.canCall)mk('Call','ac',()=>applyAct({type:'call'}));
 if(L.canRaise){const _fb=feedback(g,{type:'fold'});const _seen=new Set();
   (_fb.recRaises||[]).forEach(amt=>{const v=Math.max(L.minRaiseTo,Math.min(L.maxRaiseTo,Math.round(amt)));if(_seen.has(v))return;_seen.add(v);mk('✓ '+fmtAction(g,'raise',v),'ar rec',()=>applyAct({type:'raise',amount:v}));});
   raisePresets(L,p).forEach(([lab,val])=>{const v=Math.max(L.minRaiseTo,Math.min(L.maxRaiseTo,Math.round(val)));if(_seen.has(v))return;_seen.add(v);mk(lab,'ar',()=>applyAct({type:'raise',amount:v}));});}}
function applyAct(a){if(g.handOver)return;const beforeLen=g.board.length,beforeStreet=g.street,prevBets=collectBets();
 apply(g,a);if(g.street>beforeStreet)flyChipsToPot(prevBets);render();
 if(!g.handOver&&g.board.length>beforeLen){
   const need=[];for(let i=beforeLen;i<g.board.length;i++)if(!aState.board[i])need.push(i);
   if(need.length){pickLiveBoard(need,()=>{render();aStep();});return;}
 }
 aStep();}
/* selezione manuale del board mano a mano (flop/turn/river) */
let liveBoardQueue=null,liveBoardDone=null;
function pickLiveBoard(indices,done){liveBoardQueue=indices.slice();liveBoardDone=done;openLiveBoardGrid();}
function openLiveBoardGrid(){if(!liveBoardQueue||!liveBoardQueue.length){const d=liveBoardDone;liveBoardQueue=null;liveBoardDone=null;if(d)d();return;}
 const idx=liveBoardQueue[0],rk=c=>c.r*4+c.s,used=new Set(),queue=liveBoardQueue;
 g.players[0].hole.forEach(c=>used.add(rk(c)));
 g.board.forEach((c,i)=>{if(c&&queue.indexOf(i)<0)used.add(rk(c));});
 const streetTxt=idx<3?`flop (carta ${idx+1} di 3)`:idx===3?'turn':'river';
 let h=cardGridRows(used);
 $('cardgrid').innerHTML=h;$('cardgrid-title').textContent='Scegli la carta del '+streetTxt;
 document.querySelectorAll('#cardgrid .cgc:not(.used)').forEach(c=>{c.onclick=()=>pickLiveCard(+c.dataset.r,+c.dataset.s);});
 $('modal-cards').classList.add('show');}
function pickLiveCard(r,s){const idx=liveBoardQueue.shift();g.board[idx]={r,s};render();
 if(liveBoardQueue.length){openLiveBoardGrid();}
 else{$('modal-cards').classList.remove('show');const d=liveBoardDone;liveBoardQueue=null;liveBoardDone=null;if(d)d();}}
function trimWhy(why){let w=why||'',warn='';const wi=w.indexOf('⚠️');if(wi>=0){warn=w.slice(wi).trim();w=w.slice(0,wi).trim();}const fd=w.search(/\.\s/);if(fd>0)w=w.slice(0,fd+1);return (w+(warn?'  '+warn:'')).trim();}
function barsHTMLfor(bars){if(!bars||typeof bars.eq!=='number')return'';const eqp=Math.round(bars.eq*100),ahead=(typeof bars.po==='number')?bars.eq>=bars.po:bars.eq>=0.5;
 let h=`<div class="fbbars" style="display:flex"><div class="barrow"><span class="barlab">La tua equity</span><div class="bartrack"><div class="barfill ${ahead?'eq':'eqlow'}" style="width:${eqp}%"></div>`;
 if(typeof bars.po==='number')h+=`<div class="barmark" style="left:${Math.round(bars.po*100)}%"></div>`;
 h+=`</div><span class="barval">${eqp}%</span></div>`;
 if(typeof bars.po==='number'){const pop=Math.round(bars.po*100);h+=`<div class="barrow"><span class="barlab">Prezzo (pot odds)</span><div class="bartrack"><div class="barfill po" style="width:${pop}%"></div></div><span class="barval">${pop}%</span></div>`;}
 if(typeof bars.mdf==='number'){const m=Math.round(bars.mdf*100);h+=`<div class="barrow"><span class="barlab">MDF del range</span><div class="bartrack"><div class="barfill mdf" style="width:${m}%"></div></div><span class="barval">${m}%</span></div>`;}
 return h+`</div>`;}
function freqHTMLfor(freq){if(!freq)return'';const segs=freq.split('·').map(s=>s.trim()).map(s=>{const m=s.match(/(.+?)~?\s*(\d+)\s*%/);return m?{lab:m[1].trim(),pct:+m[2]}:null;}).filter(Boolean);
 const colOf=l=>/fold|give/i.test(l)?'g':/call/i.test(l)?'b':/check/i.test(l)?'t':'d';let bar='',leg='';
 for(const s2 of segs){bar+=`<div class="fseg c-${colOf(s2.lab)}" style="width:${s2.pct}%">${s2.pct>=14?s2.pct+'%':''}</div>`;leg+=`<span class="fleg"><i class="c-${colOf(s2.lab)}"></i>${s2.lab} ${s2.pct}%</span>`;}
 return `<div class="fbfreq"><div class="freqlabel">Frequenze GTO (stima)</div><div class="fbar">${bar}</div><div class="flegwrap">${leg}</div></div>`;}
$('an-clearboard').onclick=()=>{aState.board=[null,null,null,null,null];aState.hole=[null,null];resetAnalysis();};
buildSegs();
openAnalysis();
let _rsz;window.addEventListener('resize',()=>{clearTimeout(_rsz);_rsz=setTimeout(()=>{try{if(mode==='analyze'){if(aLive&&g)render();else renderAnalysisPreview();}}catch(e){}},160);});
</script>
